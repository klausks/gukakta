<header class="site-header" role="banner">
  <div class="header-inner">
    <div class="site-brand">
      <a href="{{ "/" | relURL }}" class="site-title">
        <span class="title-crest" aria-hidden="true">⚜</span>
        {{ .Site.Title }}
      </a>
      {{- with .Site.Params.tagline }}
      <p class="site-tagline">{{ . | safeHTML }}</p>
      {{- end }}
    </div>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
    <nav class="main-nav" role="navigation" aria-label="Primary navigation">
      <ul class="nav-list">
        {{- range .Site.Menus.main }}
        <li class="nav-item{{ if ($.IsMenuCurrent "main" .) }} nav-item--active{{ end }}">
          <a href="{{ .URL | relURL }}" class="nav-link">{{ .Name }}</a>
        </li>
        {{- end }}
      </ul>
    </nav>
    <form class="header-search" role="search" action="{{ "/search/" | absURL }}" method="get">
      <input
        class="header-search__input"
        type="search"
        name="q"
        placeholder="Search…"
        aria-label="Search wiki"
        autocomplete="off"
      />
      <button class="header-search__btn" type="submit" aria-label="Submit search">⚲</button>
    </form>
  </div>
</header>

<script>
  document.querySelector('.nav-toggle').addEventListener('click', function () {
    const nav = document.querySelector('.main-nav');
    const expanded = this.getAttribute('aria-expanded') === 'true';
    this.setAttribute('aria-expanded', String(!expanded));
    nav.classList.toggle('is-open');
  });
</script>
